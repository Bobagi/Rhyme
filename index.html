<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhyme Speech Recognition MVP</title>
    <style>
      :root {
        color-scheme: dark;
        --yellow: #ffd43b;
        --yellow-strong: #fab005;
        --yellow-soft: #fff3bf;
        --red: #ff4d4f;
        --red-dark: #c92a2a;
        --black: #050505;
        --panel: rgba(18, 18, 16, 0.9);
        --panel-strong: rgba(31, 29, 18, 0.92);
        --border: rgba(255, 212, 59, 0.22);
        --text: #fff9db;
        --muted: #c9bd8f;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 28px 16px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 212, 59, 0.2), transparent 28rem),
          radial-gradient(circle at 90% 24%, rgba(250, 176, 5, 0.12), transparent 24rem),
          linear-gradient(135deg, #050505 0%, #12100a 52%, #070707 100%);
      }

      .container {
        width: min(1040px, 100%);
        margin: 0 auto;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: 26px;
        background: rgba(5, 5, 5, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(255, 212, 59, 0.14), rgba(255, 255, 255, 0.035));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--yellow);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.8rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      h1 span { color: var(--yellow); }

      .intro {
        max-width: 620px;
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .listen-button {
        min-width: 168px;
        border: 0;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        padding: 14px 20px;
        color: #090909;
        background: linear-gradient(135deg, var(--yellow), var(--yellow-strong));
        box-shadow: 0 14px 30px rgba(250, 176, 5, 0.25);
        font: inherit;
        font-weight: 950;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .listen-button:hover { transform: translateY(-2px); box-shadow: 0 18px 38px rgba(250, 176, 5, 0.34); }
      .listen-button.is-listening { color: white; background: linear-gradient(135deg, var(--red), var(--red-dark)); box-shadow: 0 14px 30px rgba(255, 77, 79, 0.24); }
      .listen-icon { font-size: 0.9rem; line-height: 1; }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        min-height: 0;
        margin: 14px 0;
      }

      .warning, .error { line-height: 1.45; }
      .warning { color: #ffd166; }
      .error { color: #ff8787; }

      .grid {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 14px;
      }

      .panel {
        position: relative;
        min-height: 112px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 14px 34px rgba(0, 0, 0, 0.22);
        overflow: hidden;
      }

      .panel > * { position: relative; z-index: 1; }
      .panel.large { grid-column: 1 / -1; min-height: auto; }
      .panel.compact { min-height: 92px; }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        color: var(--yellow);
        font-size: 0.78rem;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .transcript {
        margin: 0;
        color: var(--yellow-soft);
        font-size: clamp(1rem, 2vw, 1.22rem);
        line-height: 1.45;
        user-select: text;
      }

      .meter {
        height: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 212, 59, 0.2);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      #microphoneLevelBar {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--yellow-strong), var(--yellow), #fff9db);
        box-shadow: 0 0 18px rgba(255, 212, 59, 0.38);
        transition: width 80ms linear;
      }

      ul {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
        user-select: text;
      }

      li {
        padding: 7px 10px;
        border: 1px solid rgba(255, 212, 59, 0.2);
        border-radius: 999px;
        color: var(--yellow-soft);
        background: rgba(255, 212, 59, 0.08);
        user-select: text;
      }

      .selectable-panel, .selectable-panel * { user-select: text; }
      #finalTranscriptHistory li { border-radius: 12px; background: rgba(255, 255, 255, 0.05); }

      @media (max-width: 760px) {
        body { padding: 14px; }
        .container { padding: 14px; border-radius: 22px; }
        .hero, .grid { grid-template-columns: 1fr; }
        .listen-button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
