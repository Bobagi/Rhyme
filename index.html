<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhyme Speech Recognition MVP</title>
    <style>
      :root {
        color-scheme: dark;
        --gold: #ffd43b;
        --gold-soft: #ffe66d;
        --gold-deep: #f59f00;
        --ink: #070707;
        --charcoal: #111111;
        --smoke: #f8f1cf;
        --muted: #a79f81;
        --glass: rgba(255, 255, 255, 0.07);
        --line: rgba(255, 212, 59, 0.22);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 32px 18px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--smoke);
        background:
          radial-gradient(circle at top left, rgba(255, 212, 59, 0.22), transparent 34rem),
          radial-gradient(circle at bottom right, rgba(245, 159, 0, 0.18), transparent 30rem),
          linear-gradient(135deg, #050505 0%, #14110a 54%, #090909 100%);
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background-image: linear-gradient(rgba(255, 212, 59, 0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 212, 59, 0.045) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.65), transparent 85%);
      }

      .container {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(145deg, rgba(17, 17, 17, 0.95), rgba(20, 16, 6, 0.88));
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.46), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: start;
        margin-bottom: 24px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
        padding: 7px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--gold-soft);
        background: rgba(255, 212, 59, 0.09);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 5.6rem);
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      h1 span { color: var(--gold); text-shadow: 0 0 28px rgba(255, 212, 59, 0.24); }

      .intro {
        max-width: 650px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1.04rem;
        line-height: 1.65;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin: 22px 0;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        color: var(--ink);
        background: linear-gradient(135deg, var(--gold), var(--gold-deep));
        box-shadow: 0 10px 26px rgba(245, 159, 0, 0.24);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      }

      button:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(245, 159, 0, 0.34); }
      button:active { transform: translateY(0); filter: brightness(0.95); }
      button.secondary { color: var(--gold-soft); background: rgba(255, 212, 59, 0.1); border: 1px solid var(--line); box-shadow: none; }

      .status-card {
        min-width: 190px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 212, 59, 0.08);
      }

      .status { font-weight: 900; color: var(--gold); }
      .warning, .error { margin-top: 8px; line-height: 1.45; }
      .warning { color: #ffd166; }
      .error { color: #ff8787; }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        position: relative;
        min-height: 150px;
        padding: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(160deg, var(--glass), rgba(255, 212, 59, 0.035));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .panel.featured { grid-column: 1 / -1; min-height: 185px; }
      .panel::after {
        position: absolute;
        top: -44px;
        right: -44px;
        width: 100px;
        height: 100px;
        border-radius: 999px;
        background: rgba(255, 212, 59, 0.08);
        content: "";
      }

      .panel strong {
        position: relative;
        z-index: 1;
        display: block;
        margin-bottom: 12px;
        color: var(--gold-soft);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .transcript {
        position: relative;
        z-index: 1;
        margin: 0;
        color: #fff8d6;
        font-size: 1.3rem;
        line-height: 1.5;
        user-select: text;
      }

      .meter {
        height: 14px;
        overflow: hidden;
        border: 1px solid rgba(255, 212, 59, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      #microphoneLevelBar {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--gold-deep), var(--gold), #fff3bf);
        box-shadow: 0 0 18px rgba(255, 212, 59, 0.35);
        transition: width 90ms linear;
      }

      ul {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }

      li {
        padding: 7px 10px;
        border: 1px solid rgba(255, 212, 59, 0.18);
        border-radius: 999px;
        color: #fff8d6;
        background: rgba(0, 0, 0, 0.24);
        user-select: text;
      }

      #finalTranscriptHistory li { border-radius: 14px; }

      @media (max-width: 760px) {
        body { padding: 16px; }
        .container { padding: 20px; border-radius: 22px; }
        .hero, .grid { grid-template-columns: 1fr; }
        .status-card { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
