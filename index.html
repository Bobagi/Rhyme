<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhyme Speech Recognition MVP</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
      .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
      .controls { display: flex; gap: 8px; margin: 12px 0; }
      button { padding: 8px 12px; }
      .status { font-weight: 700; margin-bottom: 12px; }
      .panel { border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-top: 10px; background: #fafafa; }
      .warning { color: #a15a00; }
      .error { color: #b00020; }
      ul { margin: 8px 0 0; padding-left: 20px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
